name: Update Clock

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  update-clock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate clock SVG
        run: python .github/workflows/generate_clock.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .github/workflows/clock.svg
          git diff --cached --quiet || git commit -m "Update clock"
          git push
