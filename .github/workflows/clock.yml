name: Update Clock

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-clock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate clock image
        run: python .github/workflows/generate_clock.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .github/workflows/clock.png
          git diff --cached --quiet || git commit -m "Update clock"
          git push
